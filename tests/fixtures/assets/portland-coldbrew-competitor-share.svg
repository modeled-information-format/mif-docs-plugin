<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" role="img" aria-labelledby="title desc">
  <title id="title">Portland cold-brew market: estimated share by competitor, 7 named competitors</title>
  <desc id="desc">Horizontal bar chart. Bottled Bottler Co 22%, Cafe Roast Collective 18%, Neighborhood Grind 15%, Urban Press Bar 13%, QuickCup Express 12%, Local Roasters United 11%, Others (fragmented, 6+ small operators) 9%.</desc>
  <style>
    text { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; }
    .label { font-size: 13px; fill: #1a1a1a; }
    .value { font-size: 13px; fill: #1a1a1a; font-weight: 600; }
    .axis { font-size: 11px; fill: #555555; }
  </style>
  <rect x="0" y="0" width="640" height="340" fill="#ffffff"/>
  <text x="16" y="24" class="label" font-size="15" font-weight="700">Estimated Portland cold-brew market share, by competitor</text>

  <!-- 7 bars, one per named competitor + an "others" aggregate, each with a distinct color
       (Mermaid's fixed theme palette cannot assign 7 distinct per-bar colors in its base syntax) -->
  <g transform="translate(190,44)">
    <!-- Bottled Bottler Co: 22% -->
    <text x="-10" y="14" text-anchor="end" class="label">Bottled Bottler Co</text>
    <rect x="0" y="2" width="242" height="20" fill="#1E3A5F"/>
    <text x="250" y="17" class="value">22%</text>

    <!-- Cafe Roast Collective: 18% -->
    <text x="-10" y="50" text-anchor="end" class="label">Cafe Roast Collective</text>
    <rect x="0" y="38" width="198" height="20" fill="#E07A3F"/>
    <text x="206" y="53" class="value">18%</text>

    <!-- Neighborhood Grind: 15% -->
    <text x="-10" y="86" text-anchor="end" class="label">Neighborhood Grind</text>
    <rect x="0" y="74" width="165" height="20" fill="#3F7D5C"/>
    <text x="173" y="89" class="value">15%</text>

    <!-- Urban Press Bar: 13% -->
    <text x="-10" y="122" text-anchor="end" class="label">Urban Press Bar</text>
    <rect x="0" y="110" width="143" height="20" fill="#8E5AA8"/>
    <text x="151" y="125" class="value">13%</text>

    <!-- QuickCup Express: 12% -->
    <text x="-10" y="158" text-anchor="end" class="label">QuickCup Express</text>
    <rect x="0" y="146" width="132" height="20" fill="#C94F6D"/>
    <text x="140" y="161" class="value">12%</text>

    <!-- Local Roasters United: 11% -->
    <text x="-10" y="194" text-anchor="end" class="label">Local Roasters United</text>
    <rect x="0" y="182" width="121" height="20" fill="#3C8DAD"/>
    <text x="129" y="197" class="value">11%</text>

    <!-- Others (fragmented): 9% -->
    <text x="-10" y="230" text-anchor="end" class="label">Others (6+ small operators)</text>
    <rect x="0" y="218" width="99" height="20" fill="#9A9A9A"/>
    <text x="107" y="233" class="value">9%</text>
  </g>

  <text x="16" y="320" class="axis">Source: Meridian internal wholesale/retail account survey and public menu-price review, 2026-06. Assumption-based estimate, not a fieldwork-sampled study.</text>
</svg>
