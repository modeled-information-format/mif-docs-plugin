name: ci

# CI gates: plugin-manifest validation, markdown lint, MIF conformance of every
# shipped template, the structured-MADR ADR check, plus the supply-chain gates
# (pin-check + actionlint) as thin callers of the org's central reusables. The
# attested release pipeline lives in release.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Every `uses:` in this repo MUST be pinned to a full 40-char commit SHA. Thin
  # caller of the org central pin-check reusable (consume, never reinvent).
  # modeled-information-format/.github main @ 789b6ba
  pin-check:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/pin-check.yml@05b13774259a17140419556a45a48ba6a3e36e0c

  # Workflow YAML lint via the central reusable-actionlint (verified, pinned
  # actionlint download lives in the reusable).
  # modeled-information-format/.github main @ 789b6ba
  validate-workflows:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-actionlint.yml@48c6ec9be4b8ba79b24b90395777a0343c0e3484

  # SCA: OSV-Scanner + dependency-review, as a thin caller of the org central
  # reusable (consume, never reinvent).
  sca:
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sca-osv.yml@05b13774259a17140419556a45a48ba6a3e36e0c
    with:
      fail-on-severity: high

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
      - name: Install
        run: npm ci
      - name: Validate plugin manifest + SKILL.md frontmatter
        run: npm run validate-plugin
      - name: Hydrate canonical MIF schema
        run: npm run hydrate-schema
      # Ontology validation runs at DEV (sibling ../ontologies) and at RELEASE,
      # where the mif-docs ontology is vendored/pulled into the build artifact.
      # It is intentionally NOT in push/PR CI: the ontology lives in the private
      # modeled-information-format/ontologies repo, unreachable here without auth.
      # `npm run validate-ontology` is the gate; the release workflow runs it
      # against the vendored ontology.
      - name: MIF-validate every shipped good.md template
        run: |
          # scripts/list-gated-docs.mjs is the one shared corpus definition
          # (scripts/lib/corpus.mjs), also consumed by release.yml and
          # engine-parity.mjs, so this list cannot drift from theirs the way
          # it once did (#32/#34). The adr genre is fully aligned to
          # structured-MADR and is validated by the adr-smadr job below, not
          # by mif-validate -- corpus.mjs already carves it out.
          # A plain redirect (not a process substitution) so a nonzero exit
          # from list-gated-docs.mjs fails this step under -eo pipefail,
          # instead of the while loop silently iterating zero times.
          node scripts/list-gated-docs.mjs --level 1 > /tmp/l1-files.txt
          while IFS= read -r f; do
            echo "::group::mif-validate $f"
            node scripts/mif-validate.mjs "$f" --level 1
            echo "::endgroup::"
          done < /tmp/l1-files.txt
      - name: MIF-validate the project's own docs (the suite documents itself)
        run: |
          # The suite documents itself: every doc under docs/ is a full MIF
          # artifact (the project ADRs are L3 MIF, not structured-MADR). Gate each
          # at the level it claims so its provenance/citations cannot rot.
          # list-gated-docs.mjs fails closed (missing directory, empty result)
          # so a drifted or renamed tree can't silently skip this gate; see the
          # plain-redirect note in the template-validation step above.
          node scripts/list-gated-docs.mjs --level 3 > /tmp/l3-files.txt
          while IFS= read -r f; do
            echo "::group::mif-validate L3 $f"
            node scripts/mif-validate.mjs "$f" --level 3
            echo "::endgroup::"
          done < /tmp/l3-files.txt
          node scripts/list-gated-docs.mjs --level 2 > /tmp/l2-files.txt
          while IFS= read -r f; do
            echo "::group::mif-validate L2 $f"
            node scripts/mif-validate.mjs "$f" --level 2
            echo "::endgroup::"
          done < /tmp/l2-files.txt
      - name: Enforce the L1-floor + highest-level exemplar climb
        run: node scripts/check-exemplars.mjs
      - name: Doc-set planner recipes are link-complete
        run: node scripts/planner-check.mjs
      - name: Witnessed-vs-asserted provenance coverage (idempotent at the telemetry boundary)
        run: |
          # The report itself never gates; what IS gated is its idempotency
          # contract (Story #67): two runs over identical inputs must emit
          # byte-identical output, so the diff fails the build on any
          # nondeterminism (a timestamp, an environment echo, unstable order).
          node scripts/provenance-corpus-check.mjs > /tmp/provenance-coverage-1.txt
          node scripts/provenance-corpus-check.mjs > /tmp/provenance-coverage-2.txt
          diff /tmp/provenance-coverage-1.txt /tmp/provenance-coverage-2.txt
          cat /tmp/provenance-coverage-1.txt
      - name: Fail-closed MIF guard hook blocks non-MIF genre output
        run: npm run test:hook
      - name: Markdown lint
        run: npm run lint:md

  # The flagship adr genre is fully aligned to structured-MADR; validate it with
  # the canonical structured-madr GitHub Action (SHA-pinned) in BOTH modes.
  adr-smadr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Validate ADR — structured-MADR mode (strict)
        uses: modeled-information-format/structured-madr@325eafe9a17a23e716daffddac5db10ee178c08e # main: internal actions SHA-pinned (org policy; v1.2.0 left setup-node on a tag)
        with:
          mode: smadr
          path: skills/adr/templates
          pattern: good.md
          strict: 'true'
          fail-on-error: 'true'
      - name: Validate ADR — MIF conformance mode (level 3)
        uses: modeled-information-format/structured-madr@325eafe9a17a23e716daffddac5db10ee178c08e # main: internal actions SHA-pinned (org policy; v1.2.0 left setup-node on a tag)
        with:
          mode: mif
          mif-level: '3'
          path: skills/adr/templates
          pattern: good.md
