name: ci

# CI gates: plugin-manifest validation, markdown lint, MIF conformance of every
# shipped template, the structured-MADR ADR check, plus the supply-chain gates
# (pin-check + actionlint) as thin callers of the org's central reusables. The
# attested release pipeline lives in release.yml.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Every `uses:` in this repo MUST be pinned to a full 40-char commit SHA. Thin
  # caller of the org central pin-check reusable (consume, never reinvent).
  # modeled-information-format/.github main @ 789b6ba
  pin-check:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/pin-check.yml@5c856f8118976bfd3bb64a8911f69dc9b00b4cad

  # Workflow YAML lint via the central reusable-actionlint (verified, pinned
  # actionlint download lives in the reusable).
  # modeled-information-format/.github main @ 789b6ba
  validate-workflows:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-actionlint.yml@789b6baf9a1451f406ff507aabb5c5be8a9d48a4

  # SCA: OSV-Scanner + dependency-review, as a thin caller of the org central
  # reusable (consume, never reinvent).
  sca:
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sca-osv.yml@f83ee8058630235396f7242580570b26cf3617fa
    with:
      fail-on-severity: high

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
      - name: Install
        run: npm ci
      - name: Validate plugin manifest + SKILL.md frontmatter
        run: npm run validate-plugin
      - name: Hydrate canonical MIF schema
        run: npm run hydrate-schema
      # Ontology validation runs at DEV (sibling ../ontologies) and at RELEASE,
      # where the mif-docs ontology is vendored/pulled into the build artifact.
      # It is intentionally NOT in push/PR CI: the ontology lives in the private
      # modeled-information-format/ontologies repo, unreachable here without auth.
      # `npm run validate-ontology` is the gate; the release workflow runs it
      # against the vendored ontology.
      - name: MIF-validate every shipped good.md template
        run: |
          # The adr genre is fully aligned to structured-MADR (type: adr) and is
          # validated by the structured-madr action in the adr-smadr job below,
          # not by this suite's mif-validate (which keys on conceptType).
          for f in skills/*/templates/good.md; do
            [ -f "$f" ] || continue
            [ "$f" = "skills/adr/templates/good.md" ] && continue
            echo "::group::mif-validate $f"
            node scripts/mif-validate.mjs "$f" --level 1
            echo "::endgroup::"
          done
      - name: MIF-validate the project's own docs (the suite documents itself)
        run: |
          # The suite documents itself: every doc under docs/ is a full MIF
          # artifact (the project ADRs are L3 MIF, not structured-MADR). Gate each
          # at the level it claims so its provenance/citations cannot rot.
          l3() { for f in "$@"; do [ -f "$f" ] || continue; echo "::group::mif-validate L3 $f"; node scripts/mif-validate.mjs "$f" --level 3; echo "::endgroup::"; done; }
          l2() { for f in "$@"; do [ -f "$f" ] || continue; echo "::group::mif-validate L2 $f"; node scripts/mif-validate.mjs "$f" --level 2; echo "::endgroup::"; done; }
          l3 docs/adr/*.md docs/architecture/*.md docs/runbooks/*.md docs/reference/*.md docs/explanation/*.md
          l2 docs/tutorials/*.md docs/how-to/*.md CHANGELOG.md
      - name: Enforce the L1-floor + highest-level exemplar climb
        run: node scripts/check-exemplars.mjs
      - name: Doc-set planner recipes are link-complete
        run: node scripts/planner-check.mjs
      - name: Fail-closed MIF guard hook blocks non-MIF genre output
        run: npm run test:hook
      - name: Markdown lint
        run: npm run lint:md

  # The flagship adr genre is fully aligned to structured-MADR; validate it with
  # the canonical structured-madr GitHub Action (SHA-pinned) in BOTH modes.
  adr-smadr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Validate ADR — structured-MADR mode (strict)
        uses: modeled-information-format/structured-madr@8af76a3f9d2b6a9d50986c8c93dec049664f0cfc # main: internal actions SHA-pinned (org policy; v1.2.0 left setup-node on a tag)
        with:
          mode: smadr
          path: skills/adr/templates
          pattern: good.md
          strict: 'true'
          fail-on-error: 'true'
      - name: Validate ADR — MIF conformance mode (level 3)
        uses: modeled-information-format/structured-madr@8af76a3f9d2b6a9d50986c8c93dec049664f0cfc # main: internal actions SHA-pinned (org policy; v1.2.0 left setup-node on a tag)
        with:
          mode: mif
          mif-level: '3'
          path: skills/adr/templates
          pattern: good.md
