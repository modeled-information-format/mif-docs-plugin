name: engine-parity

# Nightly (and on-demand) verdict-parity check between this repo's node
# validation engine and the mif-rs Rust engine (ADR-0004: the node engine is
# authoritative). Deliberately NON-REQUIRED: it never runs on pull requests,
# so it can never gate a merge — a parity break is a signal to file/track an
# upstream mif-rs issue, not to block plugin work. Known, tracked
# disagreements live in tests/fixtures/engine-parity/expected-disagreements.json;
# the harness fails on any unexpected disagreement AND on any stale
# expectation (an upstream fix landed and the list must be pruned).

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  attestations: read  # required by `gh attestation verify` against mif-rs's release

env:
  # Pin the mif-rs release the Rust engine is compared at. Bump deliberately:
  # a newer release changing a verdict is exactly what this job exists to
  # catch, and an unpinned "latest" would make failures unattributable. The
  # asset name is derived from this single pin in the download step.
  MIF_RS_VERSION: v0.3.1

jobs:
  parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Install
        run: npm ci
      - name: Hydrate canonical MIF schema
        run: npm run hydrate-schema
      - name: Download the pinned mif-cli release binary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "MIF_CLI_ASSET=mif-cli-${MIF_RS_VERSION#v}-linux-amd64" >> "$GITHUB_ENV"
          gh release download "$MIF_RS_VERSION" \
            --repo modeled-information-format/mif-rs \
            --pattern "mif-cli-${MIF_RS_VERSION#v}-linux-amd64"
      - name: Verify the binary's attestation (fail-closed, signer pinned)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify "$MIF_CLI_ASSET" \
            --repo modeled-information-format/mif-rs \
            --signer-workflow modeled-information-format/mif-rs/.github/workflows/release.yml
          chmod +x "$MIF_CLI_ASSET"
      - name: Engine parity over the gated corpus
        run: node scripts/engine-parity.mjs "./$MIF_CLI_ASSET"
