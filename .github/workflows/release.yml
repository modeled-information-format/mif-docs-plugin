name: release

# Attested delivery for the mif-docs Claude Code plugin.
#
# The release artifact is a REPRODUCIBLE source tarball built with `git archive`
# from the tagged commit tree (no build toolchain, deterministic bytes), attested
# with SLSA build provenance via actions/attest-build-provenance. The signer
# identity is THIS workflow, so a consumer re-verifies (pin the signer for the
# strict check):
#
#   gh attestation verify <artifact>.tar.gz \
#     --repo modeled-information-format/mif-docs-plugin \
#     --signer-workflow modeled-information-format/mif-docs-plugin/.github/workflows/release.yml
#
# `workflow_dispatch` exercises build -> attest -> verify as a dry-run without
# cutting a version; the upload-to-release step runs ONLY on a published release.
# Modeled on modeled-information-format/research-harness-template's release.yml.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # Fail-closed: a published release must carry a non-empty CHANGELOG entry for
  # its version. Skips cleanly on a workflow_dispatch dry-run (no release tag).
  changelog-check:
    uses: modeled-information-format/.github/.github/workflows/reusable-changelog-check.yml@48c6ec9be4b8ba79b24b90395777a0343c0e3484
    with:
      version: ${{ github.event.release.tag_name }}

  attest-release:
    needs: changelog-check
    runs-on: ubuntu-latest
    permissions:
      id-token: write       # OIDC token for keyless signing
      attestations: write   # write the provenance attestation
      contents: read        # checkout + verify; the release upload now uses the release App token
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Gate — plugin is valid before it is attested
        run: |
          set -euo pipefail
          npm ci
          npm run validate-plugin
          npm run hydrate-schema
          for f in skills/*/templates/good.md; do
            [ -f "$f" ] || continue
            [ "$f" = "skills/adr/templates/good.md" ] && continue
            node scripts/mif-validate.mjs "$f" --level 1
          done
          node scripts/check-exemplars.mjs
          node scripts/planner-check.mjs
          npm run test:hook
          npm run lint:md

      - name: Build reproducible source tarball
        id: build
        run: |
          set -euo pipefail
          NAME="${GITHUB_REPOSITORY##*/}"
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            VERSION="${GITHUB_REF_NAME}"
          else
            VERSION="dryrun-${GITHUB_SHA::7}"
          fi
          ARTIFACT="${NAME}-${VERSION}.tar.gz"
          # git archive is deterministic from the commit tree; gzip -n drops the
          # timestamp, so the tarball is reproducible for a given git/OS. The
          # attestation binds whatever bytes this run produced.
          git archive --format=tar --prefix="${NAME}-${VERSION}/" HEAD \
            | gzip -n > "${ARTIFACT}"
          echo "artifact=${ARTIFACT}" >> "${GITHUB_OUTPUT}"
          echo "Built ${ARTIFACT}"
          sha256sum "${ARTIFACT}"

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: ${{ steps.build.outputs.artifact }}

      - name: Verify attestation (fail-closed, before publish)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Re-verify the just-created provenance. --repo scopes trust to this
          # repository; --signer-workflow additionally pins it to THIS release
          # workflow (the certificate identity). A failure fails the job, so the
          # upload step below never runs unverified.
          gh attestation verify "${{ steps.build.outputs.artifact }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/release.yml"

      - name: Mint release app token (publish identity)
        id: release_token
        if: github.event_name == 'release'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          # RELEASE_CLIENT_APP_ID holds the App's OAuth client id (Iv23...), not
          # the numeric app id — create-github-app-token expects the client id.
          client-id: ${{ vars.RELEASE_CLIENT_APP_ID }}
          private-key: ${{ secrets.RELEASE_CLIENT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Upload attested artifact to the release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ steps.release_token.outputs.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" \
            "${{ steps.build.outputs.artifact }}" --clobber

      - name: Tag dependency-resolution alias ({name}--v{version})
        # Claude Code resolves a plugin.json semver-range dependency (e.g.
        # "version": "^0.3.1") via `git ls-remote --tags` on this repo, and
        # only recognizes tags shaped {pluginName}--v{version} — NOT the bare
        # vX.Y.Z tag `gh release create` cuts above. Without this alias tag,
        # a consumer plugin declaring a semver range on mif-docs cannot
        # resolve a version, even though the release itself is fine.
        #
        # Runs AFTER the artifact upload (not before) so that a failure here
        # never blocks the actual release deliverable from being attached.
        # Also idempotent: an annotated tag object embeds a tagger timestamp,
        # so re-creating it on a re-run produces a different object SHA even
        # for the same commit, and `git push` unconditionally rejects
        # updating an existing tag ref — so a re-run (e.g. GitHub's "re-run
        # failed jobs" after this step already succeeded once) skips instead
        # of failing.
        if: github.event_name == 'release'
        env:
          TOKEN: ${{ steps.release_token.outputs.token }}
          APP_SLUG: ${{ steps.release_token.outputs.app-slug }}
        run: |
          set -euo pipefail
          NAME="$(jq -er '.name' .claude-plugin/plugin.json)"
          VERSION="$(jq -er '.version' .claude-plugin/plugin.json)"
          if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
            echo "::error::plugin.json version (${VERSION}) does not match the release tag (${GITHUB_REF_NAME}) — refusing to create a mismatched alias tag" >&2
            exit 1
          fi
          TAG="${NAME}--v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists on origin — skipping (idempotent re-run)."
            exit 0
          fi
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${NAME} ${VERSION}"
          # actions/checkout persists its own read-only GITHUB_TOKEN as a
          # http.extraheader; that must be cleared or it wins over the
          # release App token's credentials embedded in the remote URL below.
          git config --unset-all http.https://github.com/.extraheader || true
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "refs/tags/${TAG}"
